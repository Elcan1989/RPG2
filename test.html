<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>殭屍生存：終極完整版</title>
    <style>
        body { text-align: center; background-color: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        #game-wrapper { position: relative; width: 1000px; height: 700px; margin: 0 auto; overflow: hidden; border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        canvas { background-color: #1a1a1a; display: block; }
        
        #ui-container { width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; }
        .stat-box { font-size: 16px; font-weight: bold; color: #ffcc00; text-align: left; line-height: 1.5; }
        
        #ult-container { width: 250px; background-color: #444; border: 2px solid #777; height: 18px; border-radius: 9px; overflow: hidden; position: relative; margin-bottom: 5px;}
        #ult-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0055, #ffcc00); transition: width 0.1s; }
        #ult-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 12px; line-height: 18px; color: white; font-weight: bold; }
        #xp-container { width: 100%; background-color: #333; height: 10px; margin-top: 5px; position: relative; border-radius: 5px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background-color: #00ffff; transition: width 0.1s; }
        
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        
        .action-btn { background: #ffcc00; color: #111; font-size: 18px; font-weight: bold; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; }
        .action-btn:hover { background: #fff; transform: scale(1.05); }
        .action-btn:disabled { background: #555; color: #222; cursor: not-allowed; transform: none; }
        
        .skill-btn { background: #222; border: 2px solid #00ffff; color: white; padding: 10px 20px; margin: 8px; font-size: 16px; cursor: pointer; border-radius: 8px; width: 350px; transition: 0.2s; text-align: left; }
        .skill-btn:hover { background: #00ffff; color: black; }

        .char-card { border: 2px solid #555; background: #222; padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; width: 200px; transition: 0.2s; }
        .char-card:hover { border-color: #00ffff; transform: translateY(-5px); }

        h1.game-title { color: #ff0055; font-size: 50px; text-shadow: 0 0 20px #ff0055; margin-bottom: 10px; letter-spacing: 5px; }
        
        .dmg-bar-container { width: 400px; background: #333; height: 15px; margin: 5px 0; border-radius: 5px; overflow: hidden; position: relative;}
        .dmg-bar { height: 100%; background: #ff0055; }
    </style>
</head>
<body>
    
    <div id="ui-container">
        <div class="stat-box" id="status">存活：00:00 | LV: 1 | 血：100 | 盾：0 | 金：0</div>
        <div><div id="ult-container"><div id="ult-bar"></div><div id="ult-text">大招充能中 (0%) [SPACE]</div></div></div>
    </div>
    <div id="xp-container"><div id="xp-bar"></div></div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <div id="main-menu" class="modal" style="display: flex;">
            <h1 class="game-title">無盡屍海：終極戰場</h1>
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <button class="action-btn" id="btn-goto-char">選擇英雄</button>
                <button class="action-btn" id="open-shop-btn" style="background: #00ffff;">永久商店</button>
            </div>
            <p style="color: #aaa; font-size: 14px;">WASD移動 | 自動瞄準射擊 | Shift衝刺 | Space大招 | ESC暫停</p>
        </div>

        <div id="char-menu" class="modal">
            <h1 style="color: #00ffff;">選擇你的英雄</h1>
            <div style="display: flex; gap: 15px;" id="char-list">
                <div class="char-card" onclick="startGame('commando')">
                    <h2 style="color: #ffcc00; margin:0;">特種兵</h2>
                    <p style="font-size: 14px; color: #ccc;">跑速快<br>自帶：💥散彈槍</p>
                </div>
                <div class="char-card" onclick="startGame('engineer')">
                    <h2 style="color: #00aaff; margin:0;">工程師</h2>
                    <p style="font-size: 14px; color: #ccc;">護盾強<br>自帶：💫護體法球</p>
                </div>
                <div class="char-card" onclick="startGame('heavy')">
                    <h2 style="color: #ff5555; margin:0;">重裝兵</h2>
                    <p style="font-size: 14px; color: #ccc;">血量厚、移速慢<br>自帶：🔥烈焰光環</p>
                </div>
            </div>
            <button class="action-btn" onclick="document.getElementById('char-menu').style.display='none'; document.getElementById('main-menu').style.display='flex';">返回</button>
        </div>

        <div id="shop-modal" class="modal">
            <h1 style="color: #ffcc00;">🛒 永久升級商店</h1>
            <h2 id="shop-gold-display" style="color: white;">擁有金幣: 0</h2>
            <div id="shop-items" style="width: 400px; background: #222; padding: 20px; border-radius: 10px;"></div>
            <button class="action-btn" id="close-shop-btn">返回主選單</button>
        </div>

        <div id="level-up-modal" class="modal">
            <h1 style="color: #00ffff;">升級了！選擇技能</h1>
            <div id="skill-choices"></div>
        </div>

        <div id="pause-modal" class="modal">
            <h1 style="color: white;">⏸️ 遊戲暫停</h1>
            <p id="pause-stats" style="color: #aaa;"></p>
            <button class="action-btn" onclick="togglePause()">繼續遊戲 (ESC)</button>
        </div>

        <div id="end-modal" class="modal">
            <h1 id="end-title" style="font-size: 48px;"></h1>
            <p id="end-stats" style="font-size: 18px; color: white; margin-bottom: 10px;"></p>
            <div id="dmg-metrics" style="margin-bottom: 20px; width: 400px; text-align: left;"></div>
            <button class="action-btn" onclick="location.reload()">返回主選單</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusText = document.getElementById("status");
        const xpBar = document.getElementById("xp-bar");
        const ultBar = document.getElementById("ult-bar");
        const ultText = document.getElementById("ult-text");
        const modals = {
            main: document.getElementById("main-menu"), char: document.getElementById("char-menu"),
            shop: document.getElementById("shop-modal"), level: document.getElementById("level-up-modal"), 
            end: document.getElementById("end-modal"), pause: document.getElementById("pause-modal")
        };

        let savedGold = parseInt(localStorage.getItem('zs_gold')) || 0;
        let shopUpgrades = JSON.parse(localStorage.getItem('zs_upgrades')) || { hp: 0, damage: 0, speed: 0 };
        const SHOP_CONFIG = {
            hp: { name: "💖 初始血量", cost: 50, max: 10, val: 20 },
            damage: { name: "⚔️ 基礎攻擊", cost: 100, max: 5, val: 0.5 },
            speed: { name: "👟 基礎跑速", cost: 80, max: 5, val: 0.3 }
        };

        document.getElementById("btn-goto-char").onclick = () => { modals.main.style.display = "none"; modals.char.style.display = "flex"; };
        document.getElementById("open-shop-btn").onclick = renderShop;
        document.getElementById("close-shop-btn").onclick = () => { modals.shop.style.display = "none"; modals.main.style.display = "flex"; };

        function renderShop() {
            modals.main.style.display = "none"; modals.shop.style.display = "flex";
            document.getElementById("shop-gold-display").innerText = `擁有金幣: ${savedGold}`;
            let html = "";
            for (let key in SHOP_CONFIG) {
                let c = SHOP_CONFIG[key]; let lvl = shopUpgrades[key]; let cost = Math.floor(c.cost * Math.pow(1.5, lvl)); let isMax = lvl >= c.max;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:10px;">
                    <div><span style="color:#0ff">${c.name} (Lv.${lvl}/${c.max})</span><br><span style="font-size:12px; color:#aaa">+${(lvl*c.val).toFixed(1)} &rarr; ${isMax?"MAX":"+"+((lvl+1)*c.val).toFixed(1)}</span></div>
                    <button class="action-btn" style="padding:5px 10px; font-size:14px; margin:0;" ${isMax || savedGold < cost ? "disabled":""} onclick="buyUpg('${key}',${cost})">${isMax?"MAX":"💰"+cost}</button>
                </div>`;
            }
            document.getElementById("shop-items").innerHTML = html;
        }
        function buyUpg(k, c) { savedGold -= c; shopUpgrades[k]++; localStorage.setItem('zs_gold', savedGold); localStorage.setItem('zs_upgrades', JSON.stringify(shopUpgrades)); renderShop(); }

        let gameState = "MENU"; 
        const WORLD = { width: 3000, height: 2000 };
        let camera = { x: 0, y: 0 };
        
        let player, bullets, enemyBullets, zombies, drops, fTexts, obstacles, fireZones, lightnings;
        let score, level, currentXp, xpNeeded, gameSeconds, dangerLevel, sessionGold;
        let bossActive, bossDefeated;
        let ultEnergy = 0; const MAX_ULT_ENERGY = 100;
        let shootCooldown = 0; let SHOOT_INTERVAL = 15; let targetZombie = null;
        let dmgStats = {};

        const SKILL_POOL = [
            { id: "speed", name: "👟 跑鞋", desc: "移動速度 +0.5", level: 0, maxLevel: 5, apply: () => player.speed += 0.5 },
            { id: "fireRate", name: "🔫 快槍手", desc: "射擊間隔縮短", level: 0, maxLevel: 5, apply: () => SHOOT_INTERVAL = Math.max(3, SHOOT_INTERVAL - 2) },
            { id: "multiShot", name: "💥 散彈槍", desc: "發射子彈數 +1", level: 0, maxLevel: 4, apply: () => player.multiShot += 1 },
            { id: "pierce", name: "🏹 穿透彈", desc: "子彈貫穿敵人數 +1", level: 0, maxLevel: 3, apply: () => player.basePierce += 1 },
            { id: "damage", name: "⚔️ 威力提升", desc: "所有傷害增加", level: 0, maxLevel: 5, apply: () => player.damage += 1 },
            { id: "magnet", name: "🧲 磁鐵", desc: "吸收範圍擴大", level: 0, maxLevel: 4, apply: () => player.pickupRadius += 80 },
            { id: "orbitals", name: "💫 護體法球", desc: "召喚高傷害環繞法球", level: 0, maxLevel: 4, apply: () => player.orbitals += 1 },
            { id: "shield", name: "🛡️ 能量護盾", desc: "獲得自動回復護盾", level: 0, maxLevel: 5, apply: () => { player.maxShield += 30; player.shieldRegen += 0.05; } },
            { id: "ice", name: "❄️ 冰凍附魔", desc: "子彈有20%機率緩速敵人", level: 0, maxLevel: 3, apply: () => player.iceChance += 0.2 },
            { id: "molotov", name: "🔥 燃燒瓶", desc: "定時投擲燃燒範圍區", level: 0, maxLevel: 4, apply: () => { player.molotovs += 1; player.molotovCd = 120; } },
            { id: "lightning", name: "⚡ 閃電鏈", desc: "定時施放連鎖閃電", level: 0, maxLevel: 4, apply: () => { player.lightnings += 1; player.lightningCd = 90; } }
        ];

        function startGame(charType) {
            dmgStats = { "主武器": 0, "護體法球": 0, "烈焰光環": 0, "燃燒瓶": 0, "閃電鏈": 0, "大招": 0 };
            
            player = { 
                x: 1500, y: 1000, radius: 15, color: "#00aaff", pickupRadius: 80,
                orbitals: 0, orbitalAngle: 0, auraLevel: 0, multiShot: 1, basePierce: 1,
                iceChance: 0, molotovs: 0, molotovTimer: 0, lightnings: 0, lightningTimer: 0,
                maxHp: 100 + shopUpgrades.hp * SHOP_CONFIG.hp.val,
                speed: 4 + shopUpgrades.speed * SHOP_CONFIG.speed.val,
                damage: 1 + shopUpgrades.damage * SHOP_CONFIG.damage.val,
                maxShield: 0, shield: 0, shieldRegen: 0,
                isDashing: false, dashTimer: 0, dashCooldown: 0, invulnerable: 0
            };
            
            SKILL_POOL.forEach(s => s.level = 0);
            
            if(charType === 'commando') { player.speed += 1; SKILL_POOL.find(s=>s.id==='multiShot').level=1; player.multiShot+=1; }
            if(charType === 'engineer') { player.maxShield=50; player.shieldRegen=0.1; SKILL_POOL.find(s=>s.id==='orbitals').level=1; player.orbitals=1; player.color="#00ffff"; }
            if(charType === 'heavy') { player.maxHp+=50; player.speed-=0.5; SKILL_POOL.find(s=>s.id==='damage').level=1; player.damage+=1; player.color="#ff5555"; }
            
            player.hp = player.maxHp; player.shield = player.maxShield;
            
            bullets = []; enemyBullets = []; zombies = []; drops = []; fTexts = []; obstacles = []; fireZones = []; lightnings = [];
            score = 0; level = 1; currentXp = 0; xpNeeded = 10; sessionGold = 0;
            gameSeconds = 0; dangerLevel = 0; bossActive = false; bossDefeated = false; ultEnergy = 0; updateUltUI();

            for(let i=0; i<50; i++) {
                let ox = Math.random() * (WORLD.width - 100) + 50; let oy = Math.random() * (WORLD.height - 100) + 50;
                if (Math.hypot(ox - 1500, oy - 1000) > 300) obstacles.push({ x: ox, y: oy, radius: Math.random() * 30 + 40, color: "#4d4d4d" });
            }

            modals.char.style.display = "none"; gameState = "PLAYING"; updateUI();
        }

        let keys = {}, mouseX = 500, mouseY = 350;
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (e.code === "Space" && ultEnergy >= MAX_ULT_ENERGY && gameState === "PLAYING") {
                ultEnergy = 0; updateUltUI();
                for (let i = 0; i < 36; i++) {
                    bullets.push({ x: player.x, y: player.y, radius: 8, color: "#ff00ff", dx: Math.cos((i/36)*Math.PI*2)*15, dy: Math.sin((i/36)*Math.PI*2)*15, damage: player.damage*5, pierce: 999, hitSet: new Set(), source: "大招" });
                }
            }
            if (e.code === "ShiftLeft" && player.dashCooldown <= 0 && gameState === "PLAYING") {
                player.isDashing = true; player.dashTimer = 15; player.dashCooldown = 90; player.invulnerable = 15;
            }
            if (e.code === "Escape") togglePause();
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);
        canvas.addEventListener("mousemove", (e) => { const r = canvas.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; });

        function togglePause() {
            if (gameState === "PLAYING") { gameState = "PAUSED"; modals.pause.style.display = "flex"; document.getElementById("pause-stats").innerText = `目前等級: ${level} | 擊殺: ${score}`; }
            else if (gameState === "PAUSED") { gameState = "PLAYING"; modals.pause.style.display = "none"; }
        }

        function updateUltUI() {
            ultBar.style.width = `${(ultEnergy / MAX_ULT_ENERGY) * 100}%`;
            ultText.innerText = ultEnergy >= MAX_ULT_ENERGY ? "大招 [SPACE]" : `充能 ${Math.floor((ultEnergy/MAX_ULT_ENERGY)*100)}%`;
            ultBar.style.background = ultEnergy >= MAX_ULT_ENERGY ? "linear-gradient(90deg, #ff0ff, #0ff)" : "linear-gradient(90deg, #f05, #fc0)";
        }

        function trackDmg(source, amt) { if(dmgStats[source] !== undefined) dmgStats[source] += amt; }

        function gainXp(amount) {
            currentXp += amount;
            if (currentXp >= xpNeeded && gameState === "PLAYING") processLevelUp();
            else { xpBar.style.width = `${(currentXp / xpNeeded) * 100}%`; updateUI(); }
        }

        function processLevelUp() {
            currentXp -= xpNeeded; level++; xpNeeded = Math.floor(xpNeeded * 1.2);
            gameState = "LEVEL_UP"; modals.level.style.display = "flex"; skillChoicesDiv.innerHTML = "";
            let avail = SKILL_POOL.filter(s => s.level < s.maxLevel);
            let choices = avail.length > 0 ? avail.sort(() => 0.5 - Math.random()).slice(0, 3) : [{ name: "💖 急救包", desc: "恢復 50 血量", maxLevel: null, apply: () => player.hp = Math.min(player.maxHp, player.hp + 50) }];
            
            choices.forEach(skill => {
                let btn = document.createElement("button"); btn.className = "skill-btn";
                btn.innerHTML = `<strong>${skill.name} ${skill.maxLevel?`(Lv.${skill.level+1})`:""}</strong><br><span style="font-size:13px; color:#aaa;">${skill.desc}</span>`;
                btn.onclick = () => { 
                    if(skill.maxLevel) skill.level++; skill.apply(); 
                    if (currentXp >= xpNeeded) processLevelUp(); else { gameState = "PLAYING"; modals.level.style.display = "none"; xpBar.style.width = `${(currentXp / xpNeeded) * 100}%`; updateUI(); }
                };
                skillChoicesDiv.appendChild(btn);
            });
            xpBar.style.width = `100%`; updateUI();
        }

        function updateUI() {
            let dt = dangerLevel >= 20 ? `<span style="color:#f0f;">BOSS！</span>` : `<span style="color:red;">${dangerLevel}</span>`;
            statusText.innerHTML = `${formatTime(gameSeconds)} (${dt}) | LV: ${level} | 血: ${Math.floor(player.hp)} | 盾: ${Math.floor(player.shield)} | 殺: ${score} | 💰: <span style="color:gold;">${sessionGold}</span>`;
        }

        function endGame(isWin) {
            gameState = "GAME_OVER";
            savedGold += sessionGold; localStorage.setItem('zs_gold', savedGold); 
            document.getElementById("end-title").innerText = isWin ? "🏆 勝利！" : "💀 遊戲結束";
            document.getElementById("end-title").style.color = isWin ? "#ffd700" : "#ff0000";
            document.getElementById("end-stats").innerHTML = `存活：${formatTime(gameSeconds)} | 擊殺：${score} | 獲得金幣：💰 ${sessionGold}`;
            
            let dHtml = "<h3 style='color:#0ff; margin-bottom:5px;'>傷害統計</h3>";
            let maxD = Math.max(...Object.values(dmgStats), 1);
            for(let k in dmgStats) {
                if(dmgStats[k] > 0) {
                    let w = (dmgStats[k] / maxD) * 100;
                    dHtml += `<div style='margin-bottom:5px; font-size:12px; color:#ccc;'>${k}: ${Math.floor(dmgStats[k])}</div>
                              <div class='dmg-bar-container'><div class='dmg-bar' style='width:${w}%'></div></div>`;
                }
            }
            document.getElementById("dmg-metrics").innerHTML = dHtml;
            modals.end.style.display = "flex";
        }

        // 生成邏輯
        setInterval(() => {
            if (gameState !== "PLAYING") return;
            if (dangerLevel >= 20 && !bossActive && !bossDefeated) {
                bossActive = true; zombies.push({ x: WORLD.width/2, y: -100, radius: 70, speed: 1.2, color: "#ff8800", hp: 15000 + level*300, maxHp: 15000 + level*300, type: "boss" }); return; 
            }
            if (zombies.length > (bossActive ? 80 : 350)) return;
            
            let sp = bossActive ? 1 : Math.floor(Math.random()*3) + 2 + Math.floor(dangerLevel * 1.2);
            for(let i=0; i<sp; i++) {
                let ang = Math.random()*Math.PI*2; let dist = 600 + Math.random()*200;
                let zx = Math.max(20, Math.min(WORLD.width-20, player.x + Math.cos(ang)*dist));
                let zy = Math.max(20, Math.min(WORLD.height-20, player.y + Math.sin(ang)*dist));
                
                let r = Math.random();
                if (r < Math.min(0.05, dangerLevel*0.005) && !bossActive) { 
                    zombies.push({ x: zx, y: zy, radius: 20, speed: 0.8, color: "#ff00ff", hp: 40+dangerLevel*10, type: "charger", state: "wander", chargeTimer: 0 });
                } else if (r < Math.min(0.1, dangerLevel*0.01) && !bossActive) { 
                    zombies.push({ x: zx, y: zy, radius: 18, speed: 0.5, color: "#00ff00", hp: 30+dangerLevel*8, type: "spitter", shootTimer: Math.random()*100 });
                } else if (r < Math.min(0.15, dangerLevel*0.015) && !bossActive) { 
                    zombies.push({ x: zx, y: zy, radius: 30, speed: 0.6, color: "#cc0000", hp: 80+dangerLevel*20, type: "elite" });
                } else { 
                    zombies.push({ x: zx, y: zy, radius: 14, speed: 0.8 + Math.random()*0.5 + dangerLevel*0.05, color: "#22cc22", hp: 5+dangerLevel*3, type: "normal" });
                }
            }
        }, 800);

        function resolveObs(entity) {
            for (let obs of obstacles) {
                let d = Math.hypot(entity.x - obs.x, entity.y - obs.y); let md = entity.radius + obs.radius;
                if (d < md) { let o = md - d; entity.x += ((entity.x-obs.x)/d)*o; entity.y += ((entity.y-obs.y)/d)*o; }
            }
        }
        function spawnText(x, y, d, isCrit=false) { fTexts.push({ x: x, y: y, t: `-${Math.floor(d)}`, l: 30, c: isCrit?"#ff3333":"#fff", s: isCrit?22:14 }); }

        function update() {
            if (gameState !== "PLAYING") return; 

            if (player.invulnerable > 0) player.invulnerable--;
            if (player.dashCooldown > 0) player.dashCooldown--;
            if (player.shield < player.maxShield) player.shield = Math.min(player.maxShield, player.shield + player.shieldRegen);

            let spd = player.isDashing ? player.speed * 3 : player.speed;
            if (player.dashTimer > 0) { player.dashTimer--; if(player.dashTimer<=0) player.isDashing = false; }
            
            let dx=0, dy=0;
            if (keys["ArrowUp"] || keys["KeyW"]) dy -= spd; if (keys["ArrowDown"] || keys["KeyS"]) dy += spd;
            if (keys["ArrowLeft"] || keys["KeyA"]) dx -= spd; if (keys["ArrowRight"] || keys["KeyD"]) dx += spd;
            
            if (player.isDashing && dx===0 && dy===0) { let ang = Math.atan2(mouseY-(player.y-camera.y), mouseX-(player.x-camera.x)); dx = Math.cos(ang)*spd; dy = Math.sin(ang)*spd; }
            
            player.x = Math.max(player.radius, Math.min(WORLD.width-player.radius, player.x + dx));
            player.y = Math.max(player.radius, Math.min(WORLD.height-player.radius, player.y + dy));
            resolveObs(player);

            camera.x = Math.max(0, Math.min(WORLD.width - canvas.width, player.x - canvas.width/2));
            camera.y = Math.max(0, Math.min(WORLD.height - canvas.height, player.y - canvas.height/2));
            player.orbitalAngle += 0.08;

            for (let i = drops.length - 1; i >= 0; i--) {
                let d = drops[i]; let dist = Math.hypot(player.x - d.x, player.y - d.y);
                if (d.type !== "medkit" && dist < player.pickupRadius) { d.x += (player.x - d.x)*0.15; d.y += (player.y - d.y)*0.15; }
                if (dist < player.radius + d.radius) {
                    if (d.type === "xp" || d.type === "elite_xp") gainXp(d.val);
                    else if (d.type === "medkit") { player.hp = Math.min(player.maxHp, player.hp + 50); updateUI(); }
                    else if (d.type === "coin") { sessionGold++; updateUI(); }
                    drops.splice(i, 1);
                }
            }

            if (player.molotovs > 0) {
                player.molotovTimer--;
                if(player.molotovTimer <= 0) {
                    player.molotovTimer = 120;
                    for(let i=0; i<player.molotovs; i++) {
                        let tx = player.x + (Math.random()-0.5)*500; let ty = player.y + (Math.random()-0.5)*500;
                        fireZones.push({ x: tx, y: ty, r: 80, life: 180, dmg: player.damage * 0.5 });
                    }
                }
            }
            if (player.lightnings > 0) {
                player.lightningTimer--;
                if(player.lightningTimer <= 0 && zombies.length > 0) {
                    player.lightningTimer = 90;
                    let target = zombies[Math.floor(Math.random()*zombies.length)];
                    lightnings.push({ x: target.x, y: target.y, life: 10, jumps: player.lightnings + 2, dmg: player.damage * 5 });
                    target.hp -= player.damage * 5; trackDmg("閃電鏈", player.damage * 5); spawnText(target.x, target.y, player.damage * 5, true);
                }
            }

            // 【修復】這裡將射擊角度計算，修正回「朝向目標殭屍 (targetZombie)」而非滑鼠
            targetZombie = null; let minD = Infinity;
            for (let z of zombies) { let d = Math.hypot(z.x - player.x, z.y - player.y); if (d < minD) { minD = d; targetZombie = z; } }

            shootCooldown++;
            if (shootCooldown >= SHOOT_INTERVAL && targetZombie) {
                shootCooldown = 0;
                // 正確的自動瞄準：朝向 targetZombie
                let bAng = Math.atan2(targetZombie.y - player.y, targetZombie.x - player.x);
                let sAng = bAng - (player.multiShot-1)*0.08;
                for(let k=0; k<player.multiShot; k++) {
                    bullets.push({ 
                        x: player.x, y: player.y, radius: 4, 
                        dx: Math.cos(sAng+k*0.16)*16, dy: Math.sin(sAng+k*0.16)*16, 
                        damage: player.damage, pierce: player.basePierce, hitSet: new Set(), source: "主武器" 
                    });
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.x += b.dx; b.y += b.dy;
                if (b.x<0 || b.x>WORLD.width || b.y<0 || b.y>WORLD.height) bullets.splice(i, 1);
            }
            
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i]; eb.x += eb.dx; eb.y += eb.dy;
                if (player.invulnerable <= 0 && Math.hypot(eb.x-player.x, eb.y-player.y) < player.radius + eb.r) {
                    if (player.shield > 0) player.shield -= eb.dmg; else player.hp -= eb.dmg;
                    enemyBullets.splice(i, 1); updateUI(); if(player.hp<=0) endGame(false);
                } else if (eb.x<0 || eb.x>WORLD.width || eb.y<0 || eb.y>WORLD.height) enemyBullets.splice(i, 1);
            }

            for (let i=fireZones.length-1; i>=0; i--) { fireZones[i].life--; if(fireZones[i].life<=0) fireZones.splice(i,1); }
            for (let i=lightnings.length-1; i>=0; i--) { lightnings[i].life--; if(lightnings[i].life<=0) lightnings.splice(i,1); }
            fTexts.forEach(ft => { ft.y -= 1; ft.l--; }); fTexts = fTexts.filter(ft => ft.l > 0);

            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i]; let dp = Math.hypot(player.x - z.x, player.y - z.y);
                
                let curSpeed = z.speed;
                if(z.freezeTimer > 0) { z.freezeTimer--; curSpeed *= 0.5; }

                if (z.type === "spitter") {
                    if (dp > 350) { z.x += ((player.x-z.x)/dp)*curSpeed; z.y += ((player.y-z.y)/dp)*curSpeed; }
                    else if (dp < 250) { z.x -= ((player.x-z.x)/dp)*curSpeed; z.y -= ((player.y-z.y)/dp)*curSpeed; }
                    z.shootTimer--;
                    if(z.shootTimer <= 0) { z.shootTimer = 100; let ang = Math.atan2(player.y-z.y, player.x-z.x); enemyBullets.push({x:z.x, y:z.y, r:6, dx:Math.cos(ang)*5, dy:Math.sin(ang)*5, dmg:5}); }
                } else if (z.type === "charger") {
                    if (z.state === "wander") { z.x += ((player.x-z.x)/dp)*curSpeed; z.y += ((player.y-z.y)/dp)*curSpeed; if (dp < 300 && Math.random()<0.02) { z.state = "charge"; z.chargeTimer = 30; z.cAng = Math.atan2(player.y-z.y, player.x-z.x); } }
                    else if (z.state === "charge") { z.chargeTimer--; z.x += Math.cos(z.cAng)*curSpeed*4; z.y += Math.sin(z.cAng)*curSpeed*4; if(z.chargeTimer<=0) z.state = "wander"; }
                } else {
                    if (dp > 0) { z.x += ((player.x-z.x)/dp)*curSpeed; z.y += ((player.y-z.y)/dp)*curSpeed; }
                }
                resolveObs(z);

                for (let fz of fireZones) {
                    if (Math.hypot(fz.x-z.x, fz.y-z.y) < fz.r + z.radius) { z.hp -= fz.dmg; trackDmg("燃燒瓶", fz.dmg); if(Math.random()<0.05) spawnText(z.x, z.y, fz.dmg); }
                }
                if (player.auraLevel > 0 && dp < 100 + player.auraLevel*20 + z.radius) { z.hp -= player.auraLevel*0.5; trackDmg("烈焰光環", player.auraLevel*0.5); if(Math.random()<0.05) spawnText(z.x, z.y, player.auraLevel*0.5); }
                if (player.orbitals > 0) {
                    for(let o=0; o<player.orbitals; o++) {
                        let ox = player.x + Math.cos(player.orbitalAngle+(o/player.orbitals)*Math.PI*2)*80; let oy = player.y + Math.sin(player.orbitalAngle+(o/player.orbitals)*Math.PI*2)*80;
                        if (Math.hypot(ox-z.x, oy-z.y) < 15 + z.radius) { let d = 2+player.damage*0.5; z.hp-=d; trackDmg("護體法球", d); if(Math.random()<0.1) spawnText(z.x, z.y, d); }
                    }
                }

                if (player.invulnerable <= 0 && dp < player.radius + z.radius) {
                    let d = z.type==="boss"?10 : z.type==="elite"?3 : z.type==="charger"?2 : 1;
                    if (player.shield > 0) { player.shield -= d; if(player.shield<0){ player.hp+=player.shield; player.shield=0; } } else player.hp -= d;
                    player.invulnerable = 10; updateUI(); if (player.hp <= 0) endGame(false);
                }

                let zDead = z.hp <= 0;
                if (!zDead) {
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        if (!b.hitSet.has(z) && Math.hypot(b.x-z.x, b.y-z.y) < z.radius + b.radius) {
                            let isCrit = Math.random() < 0.1; let actDmg = isCrit ? b.damage*2 : b.damage;
                            z.hp -= actDmg; spawnText(z.x, z.y, actDmg, isCrit); trackDmg(b.source, actDmg);
                            if (Math.random() < player.iceChance) z.freezeTimer = 60; 
                            
                            b.hitSet.add(z); b.pierce--; if (b.pierce <= 0) bullets.splice(j, 1);
                            if (z.hp <= 0) { zDead = true; break; }
                        }
                    }
                }

                if (zDead) {
                    if (z.type==="boss") { bossDefeated = true; endGame(true); } 
                    else if (z.type==="elite") { drops.push({ x: z.x, y: z.y, radius: 10, type: "elite_xp", val: 50 }); if(Math.random()<0.8) drops.push({ x: z.x+10, y: z.y+10, radius: 8, type: "coin" }); } 
                    else { drops.push({ x: z.x, y: z.y, radius: 5, color: "#0ff", type: "xp", val: 10 }); if(Math.random()<0.05) drops.push({ x: z.x+5, y: z.y+5, radius: 8, type: "coin" }); }
                    
                    zombies.splice(i, 1); score += 1;
                    if (ultEnergy < MAX_ULT_ENERGY) { ultEnergy = Math.min(MAX_ULT_ENERGY, ultEnergy + (z.type==="boss"?100:z.type==="elite"?10:2)); updateUltUI(); }
                    updateUI();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState === "MENU" || gameState === "PAUSED") return;

            ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
            for(let x=0; x<WORLD.width; x+=100) { ctx.beginPath(); ctx.moveTo(x-camera.x, 0-camera.y); ctx.lineTo(x-camera.x, WORLD.height-camera.y); ctx.stroke(); }
            for(let y=0; y<WORLD.height; y+=100) { ctx.beginPath(); ctx.moveTo(0-camera.x, y-camera.y); ctx.lineTo(WORLD.width-camera.x, y-camera.y); ctx.stroke(); }
            ctx.strokeStyle = "#555"; ctx.lineWidth = 10; ctx.strokeRect(0-camera.x, 0-camera.y, WORLD.width, WORLD.height);

            fireZones.forEach(f => { ctx.beginPath(); ctx.arc(f.x-camera.x, f.y-camera.y, f.r, 0, Math.PI*2); ctx.fillStyle = `rgba(255,100,0,${f.life/180 * 0.4})`; ctx.fill(); });
            obstacles.forEach(o => { ctx.beginPath(); ctx.arc(o.x-camera.x, o.y-camera.y, o.radius, 0, Math.PI*2); ctx.fillStyle = o.color; ctx.fill(); ctx.strokeStyle = "#222"; ctx.lineWidth = 3; ctx.stroke(); });

            drops.forEach(d => {
                if (d.type === "xp") { ctx.fillStyle = d.color; ctx.fillRect(d.x-camera.x-d.radius, d.y-camera.y-d.radius, d.radius*2, d.radius*2); } 
                else if (d.type === "elite_xp") { ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(d.x-camera.x, d.y-camera.y, d.radius, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth=2; ctx.stroke(); } 
                else if (d.type === "coin") { ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(d.x-camera.x, d.y-camera.y, d.radius, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = "#daaa00"; ctx.lineWidth=2; ctx.stroke(); } 
                else if (d.type === "medkit") { let dx = d.x-camera.x, dy = d.y-camera.y; ctx.fillStyle="#fff"; ctx.fillRect(dx-d.radius, dy-d.radius, d.radius*2, d.radius*2); ctx.fillStyle="#f00"; ctx.fillRect(dx-2, dy-d.radius+4, 4, d.radius*2-8); ctx.fillRect(dx-d.radius+4, dy-2, d.radius*2-8, 4); }
            });

            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x-camera.x, b.y-camera.y, b.radius, 0, Math.PI*2); ctx.fillStyle = b.color; ctx.fill(); });
            enemyBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x-camera.x, b.y-camera.y, b.r, 0, Math.PI*2); ctx.fillStyle = "#0f0"; ctx.fill(); });

            lightnings.forEach(l => { ctx.beginPath(); ctx.arc(l.x-camera.x, l.y-camera.y, 20, 0, Math.PI*2); ctx.fillStyle = `rgba(0,255,255,${l.life/10})`; ctx.fill(); });

            zombies.forEach(z => {
                ctx.beginPath(); ctx.arc(z.x-camera.x, z.y-camera.y, z.radius, 0, Math.PI*2); 
                ctx.fillStyle = z.freezeTimer > 0 ? "#55aaff" : z.color; ctx.fill(); 
                if (z.type==="boss") { ctx.strokeStyle="#f00"; ctx.lineWidth=5; ctx.stroke(); ctx.fillStyle="red"; ctx.fillRect(z.x-camera.x-30, z.y-camera.y-40, 60, 5); ctx.fillStyle="#0f0"; ctx.fillRect(z.x-camera.x-30, z.y-camera.y-40, 60*(z.hp/z.maxHp), 5); }
                else if (z.state==="charge") { ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke(); }
            });

            if (player.hp > 0) {
                let px = player.x-camera.x; let py = player.y-camera.y;
                if (player.auraLevel > 0) { ctx.beginPath(); ctx.arc(px, py, 100+player.auraLevel*20, 0, Math.PI*2); ctx.fillStyle = "rgba(255, 80, 0, 0.15)"; ctx.fill(); }
                if (player.shield > 0) { ctx.beginPath(); ctx.arc(px, py, player.radius+8, 0, Math.PI*2); ctx.strokeStyle = `rgba(0, 200, 255, ${0.4+(player.shield/player.maxShield)*0.6})`; ctx.lineWidth=4; ctx.stroke(); }
                
                // 【修復】重新繪製紅色的自瞄雷射線
                if (targetZombie && gameState === "PLAYING") {
                    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetZombie.x - camera.x, targetZombie.y - camera.y);
                    ctx.strokeStyle = "rgba(255, 50, 50, 0.4)"; ctx.lineWidth = 2; ctx.stroke();
                }

                ctx.globalAlpha = player.invulnerable > 0 ? 0.5 : 1.0;
                ctx.beginPath(); ctx.arc(px, py, player.radius, 0, Math.PI*2); ctx.fillStyle = player.color; ctx.fill();
                ctx.globalAlpha = 1.0;

                if (player.orbitals > 0) {
                    for(let o=0; o<player.orbitals; o++) {
                        let ang = player.orbitalAngle + (o/player.orbitals)*Math.PI*2;
                        ctx.beginPath(); ctx.arc(px+Math.cos(ang)*80, py+Math.sin(ang)*80, 8, 0, Math.PI*2); ctx.fillStyle = "#0ff"; ctx.fill();
                    }
                }
            }

            fTexts.forEach(ft => { ctx.fillStyle = ft.c==="red"?`rgba(255,50,50,${ft.l/30})`:`rgba(255,255,255,${ft.l/30})`; ctx.font=`bold ${ft.s}px sans-serif`; ctx.fillText(ft.t, ft.x-camera.x-10, ft.y-camera.y-15); });

            drawMiniMap(); drawIndicators();
        }

        function drawMiniMap() {
            let mw = 150, mh = 100, mx = canvas.width - mw - 10, my = 10;
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(mx, my, mw, mh); ctx.strokeStyle = "#fff"; ctx.strokeRect(mx, my, mw, mh);
            let rx = mw/WORLD.width, ry = mh/WORLD.height;
            ctx.fillStyle = "#00aaff"; ctx.beginPath(); ctx.arc(mx + player.x*rx, my + player.y*ry, 3, 0, Math.PI*2); ctx.fill();
            zombies.forEach(z => { if(z.type==="boss"||z.type==="elite") { ctx.fillStyle = z.type==="boss"?"red":"orange"; ctx.beginPath(); ctx.arc(mx + z.x*rx, my + z.y*ry, 2, 0, Math.PI*2); ctx.fill(); }});
            drops.forEach(d => { if(d.type==="medkit") { ctx.fillStyle="#0f0"; ctx.fillRect(mx + d.x*rx -1, my + d.y*ry -1, 2, 2); }});
        }

        function drawIndicators() {
            let targets = [...zombies.filter(z=>z.type==="boss"), ...drops.filter(d=>d.type==="medkit")];
            targets.forEach(t => {
                let tx = t.x-camera.x, ty = t.y-camera.y;
                if (tx < 0 || tx > canvas.width || ty < 0 || ty > canvas.height) {
                    let ang = Math.atan2(ty - canvas.height/2, tx - canvas.width/2);
                    let ix = Math.max(20, Math.min(canvas.width-20, canvas.width/2 + Math.cos(ang)*300));
                    let iy = Math.max(20, Math.min(canvas.height-20, canvas.height/2 + Math.sin(ang)*300));
                    ctx.fillStyle = t.type==="medkit"?"#0f0":"#f00"; ctx.beginPath(); ctx.arc(ix, iy, 8, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
