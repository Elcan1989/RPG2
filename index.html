<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>殭屍生存：極速升級 (調整版)</title>
    <style>
        body { text-align: center; background-color: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        #game-wrapper { position: relative; width: 800px; height: 600px; margin: 10px auto; overflow: hidden; border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        canvas { background-color: #1a1a1a; display: block; }
        
        #ui-container { width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; }
        .stat-box { font-size: 16px; font-weight: bold; color: #ffcc00; text-align: left; line-height: 1.5; }
        
        #ult-container { width: 250px; background-color: #444; border: 2px solid #777; height: 18px; border-radius: 9px; overflow: hidden; position: relative; margin-bottom: 5px;}
        #ult-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0055, #ffcc00); transition: width 0.1s; }
        #ult-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 12px; line-height: 18px; color: white; font-weight: bold; }

        #dash-container { width: 250px; background-color: #222; border: 2px solid #555; height: 18px; border-radius: 9px; overflow: hidden; position: relative; margin-bottom: 5px;}
        #dash-bar { width: 100%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        #dash-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 12px; line-height: 18px; color: white; font-weight: bold; }

        #xp-container { width: 100%; background-color: #333; height: 10px; margin-top: 5px; position: relative; border-radius: 5px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background-color: #00ffff; transition: width 0.1s; }
        
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        
        .action-btn { background: #ffcc00; color: #111; font-size: 20px; font-weight: bold; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .action-btn:hover { background: #fff; transform: scale(1.05); box-shadow: 0 0 15px #ffcc00; }
        .action-btn:disabled { background: #555; color: #222; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .skill-btn { background: #222; border: 2px solid #00ffff; color: white; padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; width: 300px; transition: 0.2s; }
        .skill-btn:hover { background: #00ffff; color: black; font-weight: bold; transform: scale(1.05); }
        .evo-btn { border-color: #ffd700; background: #332b00; box-shadow: 0 0 15px #ffd700; }
        .evo-btn:hover { background: #ffd700; color: black; }

        h1.game-title { color: #ff0055; font-size: 56px; text-shadow: 0 0 20px #ff0055; margin-bottom: 10px; letter-spacing: 5px; }
        p.game-desc { color: #ccc; font-size: 16px; line-height: 1.6; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid #444; max-width: 80%; }
        
        .shop-panel { background: #222; border: 2px solid #ffcc00; border-radius: 10px; padding: 20px; text-align: left; width: 400px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding: 10px 0; }
    </style>
</head>
<body>
    
    <div id="ui-container">
        <div class="stat-box" id="status">存活時間：00:00 (危險度 0)<br>LV: 1 | 血量：100 | 盾：0 | 金幣：0</div>
        <div>
            <div id="dash-container"><div id="dash-bar"></div><div id="dash-text">衝刺就緒 [Shift]</div></div>
            <div id="ult-container"><div id="ult-bar"></div><div id="ult-text">大招充能中 (0%) [SPACE]</div></div>
        </div>
    </div>
    <div id="xp-container"><div id="xp-bar"></div></div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="main-menu" class="modal" style="display: flex;">
            <h1 class="game-title">無盡屍海</h1>
            <p class="game-desc">
                移動: <strong>W A S D</strong> | 衝刺: <strong>Shift</strong> | 大招: <strong>Space</strong> | 暫停: <strong>ESC</strong><br>
                升級所需經驗已大幅降低！快速收集寶石，組建你的終極防禦網吧！
            </p>
            <div>
                <button class="action-btn" id="start-btn">開始生存</button>
                <button class="action-btn" id="open-shop-btn" style="background: #00ffff;">永久商店</button>
            </div>
        </div>

        <div id="shop-modal" class="modal">
            <h1 style="color: #ffcc00;">🛒 永久升級商店</h1>
            <h2 id="shop-gold-display" style="color: white;">擁有金幣: 0</h2>
            <div class="shop-panel" id="shop-items"></div>
            <button class="action-btn" id="close-shop-btn">返回主選單</button>
        </div>

        <div id="level-up-modal" class="modal">
            <h1 style="color: #00ffff; text-shadow: 0 0 10px #00ffff;">升級了！選擇技能</h1>
            <div id="skill-choices"></div>
        </div>

        <div id="end-modal" class="modal">
            <h1 id="end-title" style="font-size: 48px; margin-bottom: 5px;"></h1>
            <p id="end-stats" style="font-size: 20px; color: white; margin-bottom: 10px; margin-top: 0;"></p>
            <div id="end-damage-chart" style="margin-bottom: 20px;"></div>
            <button class="action-btn" onclick="location.reload()">返回主選單</button>
        </div>

        <div id="pause-modal" class="modal">
            <h1 style="color: #ffcc00; text-shadow: 0 0 10px #ffcc00; margin-bottom: 5px;">⏸️ 遊戲暫停</h1>
            <h2 style="color: white; margin-top: 0; font-size: 20px;">目前擁有技能</h2>
            <div id="pause-skills-list" style="width: 500px; max-height: 350px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: rgba(34,34,34,0.9); padding: 15px; border: 2px solid #555; border-radius: 10px;"></div>
            <button class="action-btn" id="resume-btn" style="margin-top: 20px;">繼續遊戲 (ESC)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusText = document.getElementById("status");
        const xpBar = document.getElementById("xp-bar");
        const ultBar = document.getElementById("ult-bar");
        const ultText = document.getElementById("ult-text");
        const dashBar = document.getElementById("dash-bar");
        const dashText = document.getElementById("dash-text");
        
        const modals = { main: document.getElementById("main-menu"), shop: document.getElementById("shop-modal"), level: document.getElementById("level-up-modal"), end: document.getElementById("end-modal"), pause: document.getElementById("pause-modal") };
        const skillChoicesDiv = document.getElementById("skill-choices");

        let lastTime = 0;
        const CELL_SIZE = 100;
        let trails = []; 

        let savedGold = parseInt(localStorage.getItem('zombie_gold')) || 0;
        let shopUpgrades = JSON.parse(localStorage.getItem('zombie_upgrades')) || { hp: 0, damage: 0, speed: 0 };
        
        const SHOP_CONFIG = {
            hp: { name: "💖 初始血量", baseCost: 50, costMult: 1.5, maxLvl: 10, effect: (lvl) => lvl * 20 },
            damage: { name: "⚔️ 基礎攻擊", baseCost: 100, costMult: 2.0, maxLvl: 5, effect: (lvl) => lvl * 0.5 },
            speed: { name: "👟 基礎跑速", baseCost: 80, costMult: 1.5, maxLvl: 5, effect: (lvl) => lvl * 0.3 }
        };

        function openShop() { modals.main.style.display = "none"; modals.shop.style.display = "flex"; renderShop(); }
        function renderShop() {
            document.getElementById("shop-gold-display").innerText = `擁有金幣: ${savedGold}`;
            const shopItemsDiv = document.getElementById("shop-items"); shopItemsDiv.innerHTML = "";
            for (let key in SHOP_CONFIG) {
                let conf = SHOP_CONFIG[key]; let curLvl = shopUpgrades[key];
                let cost = Math.floor(conf.baseCost * Math.pow(conf.costMult, curLvl));
                let isMax = curLvl >= conf.maxLvl;
                
                let div = document.createElement("div"); div.className = "shop-item";
                div.innerHTML = `
                    <div><strong style="color:#00ffff; font-size:18px;">${conf.name} (Lv.${curLvl}/${conf.maxLvl})</strong><br><span style="color:#aaa; font-size:14px;">效果: +${conf.effect(curLvl).toFixed(1)} &rarr; +${isMax ? "滿級" : conf.effect(curLvl+1).toFixed(1)}</span></div>
                    <button class="action-btn" style="margin:0; padding:8px 15px; font-size:16px;" ${isMax || savedGold < cost ? "disabled" : ""} onclick="buyUpgrade('${key}', ${cost})">${isMax ? "MAX" : `💰 ${cost}`}</button>
                `;
                shopItemsDiv.appendChild(div);
            }
        }
        function buyUpgrade(key, cost) {
            if (savedGold >= cost && shopUpgrades[key] < SHOP_CONFIG[key].maxLvl) { savedGold -= cost; shopUpgrades[key]++; localStorage.setItem('zombie_gold', savedGold); localStorage.setItem('zombie_upgrades', JSON.stringify(shopUpgrades)); renderShop(); }
        }
        document.getElementById("open-shop-btn").addEventListener("click", openShop);
        document.getElementById("close-shop-btn").addEventListener("click", () => { modals.shop.style.display = "none"; modals.main.style.display = "flex"; });

        let gameState = "MENU"; const WORLD = { width: 2400, height: 1800 }; let camera = { x: 0, y: 0 };
        let player, bullets, zombies, drops, floatingTexts, obstacles, explosions;
        let score, level, currentXp, xpNeeded, gameSeconds, dangerLevel, sessionGold;
        let bossActive, bossDefeated; let ultEnergy = 0; const MAX_ULT_ENERGY = 100;
        let shootCooldown = 0; let SHOOT_INTERVAL = 15; let targetZombie = null;

        // --- 新增實體陣列與冷卻時間 ---
        let thrownWeapons = []; // 飛行中的燃燒瓶
        let firePools = [];     // 地面火圈
        let lightningEffects = []; // 閃電視覺特效
        let molotovCooldown = 0;
        let lightningCooldown = 0;

        let damageStats = { shoot: 0, explosion: 0, orbital: 0, aura: 0, ult: 0, molotov: 0, lightning: 0 };

        const SKILL_POOL = [
            { id: "speed", name: "👟 跑鞋", desc: "移動速度增加", level: 0, maxLevel: 5, apply: () => player.speed += 0.5 },
            { id: "fireRate", name: "🔫 快槍手", desc: "射擊間隔縮短", level: 0, maxLevel: 5, apply: () => SHOOT_INTERVAL = Math.max(3, SHOOT_INTERVAL - 2.5) },
            { id: "multiShot", name: "💥 散彈槍", desc: "發射子彈數 +1 (滿級可合成)", level: 0, maxLevel: 4, apply: () => player.multiShot += 1 },
            { id: "pierce", name: "🏹 穿透彈", desc: "子彈貫穿敵人數 +1", level: 0, maxLevel: 3, apply: () => player.basePierce += 1 },
            { id: "damage", name: "⚔️ 威力提升", desc: "子彈傷害增加", level: 0, maxLevel: 5, apply: () => player.damage += 1 },
            { id: "magnet", name: "🧲 磁鐵", desc: "寶石吸收範圍擴大", level: 0, maxLevel: 4, apply: () => player.pickupRadius += 80 },
            { id: "orbitals", name: "💫 護體法球", desc: "召喚高傷害環繞法球", level: 0, maxLevel: 4, apply: () => player.orbitals += 1 },
            { id: "shield", name: "🛡️ 能量護盾", desc: "獲得可自動回復的護盾", level: 0, maxLevel: 5, apply: () => { player.maxShield += 25; player.shieldRegen += 0.05; } },
            // 新增技能 (無進化)
            { id: "molotov", name: "🔥 燃燒瓶", desc: "投擲燃燒瓶產生持續傷害火圈", level: 0, maxLevel: 5, apply: () => player.molotovLevel += 1 },
            { id: "lightning", name: "⚡ 閃電鏈", desc: "釋放在敵人之間彈跳的閃電", level: 0, maxLevel: 5, apply: () => player.lightningLevel += 1 }
        ];

        const EVOLUTIONS = [
            { id: "evo_explosive", reqWeapon: "multiShot", reqPassive: "damage", name: "✨ [超級進化] 爆裂彈", desc: "散彈槍終極進化！命中時產生大範圍毀滅爆炸！", applied: false, apply: () => { player.isEvolvedShot = true; } }
        ];

        const FALLBACK_SKILL = { id: "heal", name: "💖 急救包", desc: "立刻恢復 50 點血量", level: 0, maxLevel: null, apply: () => player.hp = Math.min(player.maxHp, player.hp + 50) };

        function togglePause() {
            if (gameState === "PLAYING") { gameState = "PAUSED"; renderPauseMenu(); modals.pause.style.display = "flex"; } 
            else if (gameState === "PAUSED") { gameState = "PLAYING"; modals.pause.style.display = "none"; }
        }

        function renderPauseMenu() {
            const listDiv = document.getElementById("pause-skills-list"); listDiv.innerHTML = "";
            let acquiredSkills = SKILL_POOL.filter(s => s.level > 0); let acquiredEvos = EVOLUTIONS.filter(e => e.applied);
            if (acquiredSkills.length === 0 && acquiredEvos.length === 0) { listDiv.innerHTML = "<p style='color: #aaa; width: 100%; text-align: center; font-size: 18px;'>目前尚未獲得任何技能</p>"; return; }
            acquiredEvos.forEach(evo => {
                let item = document.createElement("div"); item.style.cssText = "background: #332b00; border: 2px solid #ffd700; padding: 10px; border-radius: 8px; width: 45%; box-sizing: border-box; text-align: center; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);";
                item.innerHTML = `<strong style="color:#ffd700; font-size: 16px;">${evo.name}</strong><br><span style="font-size:14px; color:#ddd;">MAX</span>`; listDiv.appendChild(item);
            });
            acquiredSkills.forEach(skill => {
                let item = document.createElement("div"); let isMax = skill.level >= skill.maxLevel;
                item.style.cssText = `background: #222; border: 2px solid ${isMax ? '#00ffcc' : '#555'}; padding: 10px; border-radius: 8px; width: 45%; box-sizing: border-box; text-align: center;`;
                item.innerHTML = `<strong style="color:#00ffff; font-size: 16px;">${skill.name}</strong><br><span style="font-size:14px; color:${isMax ? '#00ffcc' : '#aaa'};">Lv. ${skill.level} ${isMax ? '(MAX)' : ` / ${skill.maxLevel}`}</span>`; listDiv.appendChild(item);
            });
        }
        document.getElementById("resume-btn").addEventListener("click", togglePause);

        function initGame() {
            player = { 
                x: 1200, y: 900, radius: 15, color: "#00aaff", pickupRadius: 80,
                orbitals: 0, orbitalAngle: 0, auraLevel: 0, multiShot: 1, basePierce: 1,
                maxHp: 100 + SHOP_CONFIG.hp.effect(shopUpgrades.hp),
                speed: 4 + SHOP_CONFIG.speed.effect(shopUpgrades.speed),
                damage: 1 + SHOP_CONFIG.damage.effect(shopUpgrades.damage),
                maxShield: 0, shield: 0, shieldRegen: 0,
                isEvolvedShot: false,
                molotovLevel: 0, lightningLevel: 0,
                // Dash
                isDashing: false, isInvincible: false, dashCooldown: 0, dashCooldownMax: 3.0, dashTimer: 0, dashDuration: 0.2, dashSpeedMult: 3.5
            };
            player.hp = player.maxHp;
            
            bullets = []; zombies = []; drops = []; floatingTexts = []; obstacles = []; explosions = []; trails = [];
            thrownWeapons = []; firePools = []; lightningEffects = [];
            molotovCooldown = 0; lightningCooldown = 0;
            
            score = 0; level = 1; currentXp = 0; sessionGold = 0; xpNeeded = 10; 
            gameSeconds = 0; dangerLevel = 0; bossActive = false; bossDefeated = false;
            ultEnergy = 0; updateUltUI();
            damageStats = { shoot: 0, explosion: 0, orbital: 0, aura: 0, ult: 0, molotov: 0, lightning: 0 };
            
            dashBar.style.width = `100%`; dashBar.style.background = "#00ffcc"; dashText.innerText = "衝刺就緒 [Shift]";

            for(let i=0; i<40; i++) {
                let ox = Math.random() * (WORLD.width - 100) + 50; let oy = Math.random() * (WORLD.height - 100) + 50;
                if (Math.hypot(ox - 1200, oy - 900) > 250) obstacles.push({ x: ox, y: oy, radius: Math.random() * 25 + 30, color: "#555" });
            }
            SKILL_POOL.forEach(s => s.level = 0); EVOLUTIONS.forEach(evo => evo.applied = false);
        }

        document.getElementById("start-btn").addEventListener("click", () => { initGame(); modals.main.style.display = "none"; gameState = "PLAYING"; updateUI(); });

        setInterval(() => {
            if (gameState === "PLAYING") {
                gameSeconds++; dangerLevel = Math.floor(gameSeconds / 15); updateUI();
                if (gameSeconds % 20 === 0 && !bossActive) {
                    let spawnX, spawnY; let isValid = false; let attempts = 0; const medkitRadius = 12;
                    while (!isValid && attempts < 50) {
                        spawnX = Math.random() * WORLD.width; spawnY = Math.random() * WORLD.height; isValid = true;
                        for (let obs of obstacles) { if (Math.hypot(spawnX - obs.x, spawnY - obs.y) < medkitRadius + obs.radius) { isValid = false; break; } }
                        attempts++;
                    }
                    if (isValid) drops.push({ x: spawnX, y: spawnY, radius: medkitRadius, type: "medkit" });
                }
            }
        }, 1000);

        function formatTime(sec) { return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`; }

        let keys = {};
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (e.code === "Escape") togglePause();
            if (e.code === "Space" && ultEnergy >= MAX_ULT_ENERGY && gameState === "PLAYING") {
                ultEnergy = 0; updateUltUI();
                const bulletCount = 24 + (level * 2); 
                for (let i = 0; i < bulletCount; i++) {
                    const angle = (i / bulletCount) * Math.PI * 2;
                    bullets.push({ x: player.x, y: player.y, radius: 8, color: "#ff00ff", dx: Math.cos(angle) * 12, dy: Math.sin(angle) * 12, damage: player.damage * 4, pierce: Infinity, hitZombies: new Set(), isUlt: true });
                }
                canvas.style.borderColor = "#ff00ff"; setTimeout(() => canvas.style.borderColor = "#555", 200);
            }
            if ((e.code === "ShiftLeft" || e.code === "ShiftRight") && gameState === "PLAYING") {
                if (player.dashCooldown <= 0 && !player.isDashing) { player.isDashing = true; player.isInvincible = true; player.dashTimer = player.dashDuration; player.dashCooldown = player.dashCooldownMax; }
            }
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function updateUltUI() {
            ultBar.style.width = `${(ultEnergy / MAX_ULT_ENERGY) * 100}%`;
            ultText.innerText = ultEnergy >= MAX_ULT_ENERGY ? "大招就緒 [SPACE]" : `充能 (${Math.floor((ultEnergy/MAX_ULT_ENERGY)*100)}%)`;
            ultBar.style.background = ultEnergy >= MAX_ULT_ENERGY ? "linear-gradient(90deg, #ff00ff, #00ffff)" : "linear-gradient(90deg, #ff0055, #ffcc00)";
        }

        function gainXp(amount) {
            currentXp += amount;
            if (currentXp >= xpNeeded && gameState === "PLAYING") processLevelUp(); else { xpBar.style.width = `${(currentXp / xpNeeded) * 100}%`; updateUI(); }
        }

        function processLevelUp() {
            currentXp -= xpNeeded; level++; xpNeeded = Math.floor(xpNeeded * 1.2); 
            gameState = "LEVEL_UP"; modals.level.style.display = "flex"; skillChoicesDiv.innerHTML = "";
            let availableSkills = SKILL_POOL.filter(s => s.level < s.maxLevel);
            EVOLUTIONS.forEach(evo => {
                if (!evo.applied) {
                    let wpn = SKILL_POOL.find(s => s.id === evo.reqWeapon); let pass = SKILL_POOL.find(s => s.id === evo.reqPassive);
                    if (wpn && wpn.level >= wpn.maxLevel && pass && pass.level > 0) { availableSkills.push({ name: evo.name, desc: evo.desc, level: 0, maxLevel: 1, isEvo: true, apply: () => { evo.applied = true; evo.apply(); } }); }
                }
            });
            let choices = availableSkills.length > 0 ? availableSkills.sort(() => 0.5 - Math.random()).slice(0, 3) : [FALLBACK_SKILL];
            choices.forEach(skill => {
                let btn = document.createElement("button"); btn.className = skill.isEvo ? "skill-btn evo-btn" : "skill-btn";
                let levelText = skill.maxLevel && !skill.isEvo ? ` (Lv.${skill.level + 1}/${skill.maxLevel})` : "";
                btn.innerHTML = `<strong>${skill.name}${levelText}</strong><br><span style="font-size:14px; color:${skill.isEvo ? '#fff' : '#aaa'};">${skill.desc}</span>`;
                btn.onclick = () => { 
                    if(skill.maxLevel !== null) skill.level++; skill.apply(); 
                    if (currentXp >= xpNeeded) processLevelUp(); else { gameState = "PLAYING"; modals.level.style.display = "none"; xpBar.style.width = `${(currentXp / xpNeeded) * 100}%`; updateUI(); }
                };
                skillChoicesDiv.appendChild(btn);
            });
            xpBar.style.width = `100%`; updateUI();
        }

        function updateUI() {
            let dangerText = dangerLevel >= 20 ? `<span style="color:#ff00ff;">BOSS！</span>` : `<span style="color:red;">${dangerLevel}</span>`;
            let shieldText = player.maxShield > 0 ? ` | 盾：<span style="color:#00ffff;">${Math.floor(player.shield)}/${player.maxShield}</span>` : "";
            statusText.innerHTML = `時間：${formatTime(gameSeconds)} (危險 ${dangerText})<br>LV: ${level} | 血：${Math.floor(player.hp)}/${player.maxHp}${shieldText} | 殺：${score} | 金：<span style="color:gold;">${sessionGold}</span>`;
        }

        function endGame(isWin) {
            gameState = "GAME_OVER"; savedGold += sessionGold; localStorage.setItem('zombie_gold', savedGold); 
            document.getElementById("end-title").innerText = isWin ? "🏆 勝利！" : "💀 遊戲結束"; document.getElementById("end-title").style.color = isWin ? "#ffd700" : "#ff0000";
            document.getElementById("end-stats").innerHTML = `存活：${formatTime(gameSeconds)} | 最終等級：${level} | 擊殺：${score} | 金幣：💰 ${sessionGold}`;
            
            let totalDamage = Object.values(damageStats).reduce((a, b) => a + b, 0);
            let chartHTML = `<div style="width: 450px; text-align: left; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #555;">`;
            chartHTML += `<h3 style="margin: 0 0 10px 0; color: #fff; font-size: 18px; text-align: center;">戰鬥傷害分析</h3>`;
            
            if (totalDamage === 0) { chartHTML += `<p style="text-align: center; color: #aaa;">沒有造成任何傷害</p>`; } 
            else {
                let maxDmg = Math.max(...Object.values(damageStats));

        function drawOffScreenIndicators() {
            const padding = 25; const cx = canvas.width / 2; const cy = canvas.height / 2; let targets = [];
            drops.forEach(d => { if (d.type === "medkit") targets.push({ x: d.x, y: d.y, type: "medkit" }); });
            zombies.forEach(z => { if (z.isBoss) targets.push({ x: z.x, y: z.y, type: "boss" }); });

            targets.forEach(target => {
                let screenX = target.x - camera.x; let screenY = target.y - camera.y;
                if (screenX < 0 || screenX > canvas.width || screenY < 0 || screenY > canvas.height) {
                    let dx = screenX - cx; let dy = screenY - cy; let angle = Math.atan2(dy, dx);
                    let scaleX = (cx - padding) / Math.abs(dx); let scaleY = (cy - padding) / Math.abs(dy); let scale = Math.min(scaleX, scaleY);

                    if (target.type === "medkit") { ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 3; ctx.stroke(); }

                if (targetZombie && gameState === "PLAYING") { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(targetZombie.x - camera.x, targetZombie.y - camera.y); ctx.strokeStyle = "rgba(255, 50, 50, 0.5)"; ctx.lineWidth = 2; ctx.stroke(); ctx.closePath(); }
                if (player.isInvincible) { ctx.shadowBlur = 15; ctx.shadowColor = "#00ffcc"; }
                ctx.beginPath(); ctx.arc(px, py, player.radius, 0, Math.PI * 2); ctx.fillStyle = player.color; ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0; 
                if (player.orbitals > 0 && gameState !== "MENU") { for(let o = 0; o < player.orbitals; o++) { let angle = player.orbitalAngle + (o / player.orbitals) * Math.PI * 2; ctx.beginPath(); ctx.arc(px + Math.cos(angle)*70, py + Math.sin(angle)*70, 8, 0, Math.PI * 2); ctx.fillStyle = "#0ff"; ctx.fill(); ctx.closePath(); } }
            }

            if (gameState === "PLAYING" || gameState === "PAUSED") { drawOffScreenIndicators(); }

            if (gameState === "PLAYING" || gameState === "PAUSED") {
                floatingTexts.forEach(ft => { ctx.fillStyle = ft.color === "#ff3333" ? `rgba(255, 51, 51, ${ft.life/30})` : `rgba(255, 255, 255, ${ft.life/30})`; ctx.font = `bold ${ft.size}px sans-serif`; ctx.fillText(ft.text, ft.x - camera.x - 10, ft.y - camera.y - 15); });
            }
        }

        function gameLoop(timestamp) { let dt = (timestamp - lastTime) / 1000; lastTime = timestamp; if (dt > 0.1) dt = 0.1; update(dt); draw(); requestAnimationFrame(gameLoop); }
        initGame(); requestAnimationFrame((timestamp) => { lastTime = timestamp; gameLoop(timestamp); });
    </script>
</body>
</html>
